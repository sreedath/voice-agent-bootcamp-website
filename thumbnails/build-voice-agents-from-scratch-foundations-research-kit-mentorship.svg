<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4B9EFF"/>
      <stop offset="33%" stop-color="#9565FF"/>
      <stop offset="66%" stop-color="#ED4FCA"/>
      <stop offset="100%" stop-color="#F76E35"/>
    </linearGradient>
    <linearGradient id="brandDiag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B9EFF"/>
      <stop offset="33%" stop-color="#9565FF"/>
      <stop offset="66%" stop-color="#ED4FCA"/>
      <stop offset="100%" stop-color="#F76E35"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9565FF" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#ED4FCA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <circle cx="1000" cy="360" r="500" fill="url(#orb)"/>

  <g transform="translate(80, 180)">
    <rect width="280" height="32" rx="16" fill="url(#brand)"/>
    <text x="140" y="21" text-anchor="middle" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#ffffff">★ BEST VALUE · SAVE ₹35,000 ★</text>
  </g>

  <text x="80" y="290" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#1d1d1f" letter-spacing="-2">The Complete</text>
  <text x="80" y="362" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#brand)" letter-spacing="-2">Voice AI Bundle.</text>

  <text x="80" y="420" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#6e6e73">Bootcamp + Research Starter + Mentorship — everything.</text>

  <g transform="translate(80, 470)">
    <rect width="660" height="160" rx="16" fill="#f5f5f7" stroke="#e8e8ed"/>

    <g transform="translate(24, 22)">
      <circle cx="14" cy="14" r="14" fill="url(#brandDiag)"/>
      <text x="14" y="20" text-anchor="middle" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff">1</text>
      <text x="42" y="14" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d1d1f">8-Day Foundations Bootcamp</text>
      <text x="42" y="30" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#6e6e73">ASR · TTS · LLMs · Streaming · Capstone</text>
    </g>

    <g transform="translate(24, 64)">
      <circle cx="14" cy="14" r="14" fill="url(#brandDiag)"/>
      <text x="14" y="20" text-anchor="middle" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff">2</text>
      <text x="42" y="14" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d1d1f">Research Starter Kit</text>
      <text x="42" y="30" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#6e6e73">Personalised roadmap · Initial paper draft · Code</text>
    </g>

    <g transform="translate(24, 106)">
      <circle cx="14" cy="14" r="14" fill="url(#brandDiag)"/>
      <text x="14" y="20" text-anchor="middle" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff">3</text>
      <text x="42" y="14" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d1d1f">3-Month Async Research Mentorship</text>
      <text x="42" y="30" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#6e6e73">From topic selection to publishable paper</text>
    </g>
  </g>

  <text x="80" y="675" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#86868b">Taught and mentored by <tspan font-weight="700" fill="#1d1d1f">Dr. Sreedath Panat</tspan> · MIT PhD · Vizuara AI Labs</text>

  <!-- Right side: 3-card stack with star -->
  <g transform="translate(820, 240)">
    <!-- Star backdrop -->
    <g transform="translate(150, 100)">
      <circle cx="0" cy="0" r="120" fill="none" stroke="url(#brandDiag)" stroke-width="2" opacity="0.3"/>
      <circle cx="0" cy="0" r="80" fill="none" stroke="url(#brandDiag)" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- Card 1: mic -->
    <g transform="translate(0, 30) rotate(-8 90 90)">
      <rect width="180" height="180" rx="20" fill="#ffffff" stroke="#e8e8ed" stroke-width="2"/>
      <circle cx="90" cy="80" r="38" fill="url(#brandDiag)"/>
      <rect x="82" y="60" width="16" height="26" rx="8" fill="#ffffff"/>
      <path d="M 72 84 Q 72 98 90 98 Q 108 98 108 84" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="90" y="148" text-anchor="middle" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d1d1f">FOUNDATIONS</text>
    </g>

    <!-- Card 2: doc (center, biggest) -->
    <g transform="translate(110, 0)">
      <rect width="180" height="180" rx="20" fill="#ffffff" stroke="url(#brandDiag)" stroke-width="3"/>
      <g transform="translate(50, 40)">
        <rect width="80" height="80" rx="6" fill="url(#brandDiag)"/>
        <rect x="14" y="20" width="52" height="5" rx="2.5" fill="#ffffff"/>
        <rect x="14" y="34" width="52" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
        <rect x="14" y="46" width="40" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
        <rect x="14" y="58" width="48" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
      </g>
      <text x="90" y="148" text-anchor="middle" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d1d1f">RESEARCH KIT</text>
    </g>

    <!-- Card 3: cap -->
    <g transform="translate(220, 30) rotate(8 90 90)">
      <rect width="180" height="180" rx="20" fill="#ffffff" stroke="#e8e8ed" stroke-width="2"/>
      <g transform="translate(40, 45)">
        <polygon points="50,0 100,20 50,40 0,20" fill="url(#brandDiag)"/>
        <path d="M 15 30 Q 15 55 50 55 Q 85 55 85 30 L 85 38 Q 85 65 50 65 Q 15 65 15 38 Z" fill="#1d1d1f"/>
        <line x1="100" y1="20" x2="112" y2="40" stroke="#F76E35" stroke-width="2.5"/>
        <circle cx="112" cy="44" r="4" fill="#F76E35"/>
      </g>
      <text x="90" y="148" text-anchor="middle" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d1d1f">MENTORSHIP</text>
    </g>
  </g>

  <rect x="0" y="710" width="1280" height="10" fill="url(#brand)"/>
</svg>
